<!doctype html>
<html lang="es">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta http-equiv="Cache-Control" content="no-cache" />
    <meta http-equiv="Pragma" content="no-cache" />

    <title>Escaletas</title>
    <!-- <link rel="icon" type="image/x-icon" href="/assets/icon.png" /> -->

    <link rel="stylesheet" type="text/css" href="./style.css" />
  </head>

  <body>
    <div id="body" class="noContext" style="width: 100vw; height: 100vh">
      <!-- ----------------------------------------------------------------------------CANVAS -->
      <section
        id="canvas"
        class="dragArea context"
        style="width: 100vw; height: 100vh; overflow: auto; position: relative"
      >
        <div id="innerCanvas" style="position: relative"></div>
      </section>

      <!-- ----------------------------------------------------------------------------INTERFAZ -->
      <div id="summonableMenus" class="noContext">
        <!-- ------------------------------------------------------------CONTEXT MENU -->
        <div id="contextMenu" class="noContext">
          <button class="menuOption"></button>
        </div>

        <!-- ------------------------------------------------------------ICON MENU -->
        <div id="iconMenu" class="noContext oculto"></div>
      </div>
      <div
        id="debugCursor"
        style="
          padding: 4px;
          z-index: 100;
          background-color: rgba(255, 255, 255, 0.9);
          pointer-events: none;
          white-space: pre-line;
        "
      ></div>

      <!-- ------------------------------------------------------------BARRA SUPERIOR -->
      <!-- <header
        id="barraSuperior"
        class="noContext"
        style="
          width: 100vw;
          height: 80px;

          position: absolute;
          top: 0px;
          left: 0px;

          display: flex;
          flex-direction: row;
          justify-content: baseline;
          align-items: baseline;

          background-color: rgb(244, 244, 244);
        "
      >
      </header> -->
    </div>

    <!-- ----------------------------------------------------------------------------SCRIPTS -->
    <!-- Funciones auxiliares -->
    <script src="./js/auxiliares.js"></script>

    <!-- Huesos -->
    <script src="./js/huesos/huesosBase.js"></script>
    <script src="./js/huesos/huesosUI.js"></script>

    <!-- Debug -->
    <script src="./js/debug.js"></script>

    <!-- Menú contextual personalizado -->
    <script src="./js/contextMenu/contextMenu.js"></script>
    <script src="./js/contextMenu/iconMenu.js"></script>

    <!-- Eventos -->
    <script src="./js/eventos/evento_main.js"></script>
    <script src="./js/eventos/evento_head.js"></script>
    <script src="./js/eventos/evento_personajes.js"></script>
    <script src="./js/eventos/evento.js"></script>

    <!-- Tramas -->
    <script src="./js/tramas.js"></script>

    <!-- Fondo -->
    <script src="./js/canvas.js"></script>

    <!-- Personajes -->
    <script src="./js/perfiles.js"></script>
  </body>
</html>
